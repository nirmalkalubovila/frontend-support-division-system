name: Frontend CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Next.js Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Build
        run: npm run build
